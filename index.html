<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tontine 2026</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  /* =============================================
     TONTINE TRACKER — index.html
     Pour mettre à jour : modifie les données dans
     la section "CONFIG — MODIFIER ICI" ci-dessous
     ============================================= */

  :root {
    --bg: #0f0f11;
    --surface: #1a1a1f;
    --surface2: #222228;
    --border: rgba(255,255,255,0.07);
    --text: #f0ede8;
    --muted: rgba(240,237,232,0.45);
    --green: #3ecf8e;
    --green-bg: rgba(62,207,142,0.12);
    --amber: #f59e0b;
    --amber-bg: rgba(245,158,11,0.12);
    --red: #f87171;
    --red-bg: rgba(248,113,113,0.10);
    --radius: 14px;
    --radius-sm: 8px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    padding: 0 0 3rem;
  }

  /* ---- HEADER ---- */
  .hero {
    padding: 2.5rem 1.25rem 2rem;
    border-bottom: 1px solid var(--border);
    position: relative;
    overflow: hidden;
  }
  .hero::before {
    content: '';
    position: absolute;
    top: -60px; right: -60px;
    width: 220px; height: 220px;
    background: radial-gradient(circle, rgba(62,207,142,0.15) 0%, transparent 70%);
    pointer-events: none;
  }
  .hero-label {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--green);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .hero-title {
    font-size: 26px;
    font-weight: 600;
    letter-spacing: -0.5px;
    margin-bottom: 4px;
  }
  .hero-sub {
    font-size: 13px;
    color: var(--muted);
  }

  /* ---- STATS GRID ---- */
  .stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    padding: 1.25rem 1.25rem 0;
  }
  .stat {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 14px 12px;
  }
  .stat-label {
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 5px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  .stat-value {
    font-size: 22px;
    font-weight: 600;
    font-family: 'DM Mono', monospace;
  }
  .stat-value.green { color: var(--green); }

  /* ---- GLOBAL PROGRESS ---- */
  .global-wrap {
    padding: 1.25rem 1.25rem 0;
  }
  .progress-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 8px;
  }
  .progress-header span {
    font-size: 12px;
    color: var(--muted);
  }
  .progress-header strong {
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    color: var(--text);
  }
  .bar-bg {
    background: var(--surface2);
    border-radius: 99px;
    height: 8px;
    overflow: hidden;
  }
  .bar-fill {
    height: 100%;
    border-radius: 99px;
    background: linear-gradient(90deg, #3ecf8e, #34d9a0);
  }

  /* ---- SECTION LABEL ---- */
  .section-label {
    font-size: 11px;
    font-weight: 500;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    padding: 1.5rem 1.25rem 0.75rem;
  }

  /* ---- MEMBER CARDS ---- */
  .members {
    display: flex;
    flex-direction: column;
    gap: 8px;
    padding: 0 1.25rem;
  }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    transition: border-color 0.2s;
  }
  .card.paid { border-left: 3px solid var(--green); }
  .card.partial { border-left: 3px solid var(--amber); }
  .card.none { border-left: 3px solid var(--surface2); }

  .card-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }
  .member-info {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .avatar {
    width: 34px;
    height: 34px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 600;
    font-family: 'DM Mono', monospace;
    flex-shrink: 0;
  }
  .av-green { background: var(--green-bg); color: var(--green); }
  .av-amber { background: var(--amber-bg); color: var(--amber); }
  .av-gray { background: var(--surface2); color: var(--muted); }

  .member-name {
    font-size: 15px;
    font-weight: 500;
  }
  .member-paid-count {
    font-size: 11px;
    color: var(--muted);
    margin-top: 1px;
  }

  .amount-badge {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    font-weight: 500;
    padding: 4px 10px;
    border-radius: 99px;
  }
  .badge-green { background: var(--green-bg); color: var(--green); }
  .badge-amber { background: var(--amber-bg); color: var(--amber); }
  .badge-gray { background: var(--surface2); color: var(--muted); }

  /* ---- MONTH DOTS ---- */
  .months {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }
  .dot {
    width: 36px;
    height: 32px;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    font-weight: 500;
    font-family: 'DM Mono', monospace;
    letter-spacing: 0;
  }
  .dot-paid { background: var(--green-bg); color: var(--green); }
  .dot-current { background: var(--amber-bg); color: var(--amber); }
  .dot-unpaid { background: var(--surface2); color: rgba(240,237,232,0.2); }

  /* ---- LEGEND ---- */
  .legend {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    padding: 1.25rem 1.25rem 0;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: var(--muted);
  }
  .legend-dot {
    width: 10px;
    height: 10px;
    border-radius: 3px;
  }

  /* ---- FOOTER ---- */
  .footer {
    text-align: center;
    padding: 2rem 1.25rem 0;
    font-size: 11px;
    color: rgba(240,237,232,0.2);
    font-family: 'DM Mono', monospace;
  }
</style>
</head>
<body>

<script>
/* =====================================================
   ✏️  CONFIG — MODIFIER ICI CHAQUE MOIS
   =====================================================

   Pour chaque membre, mets TRUE si la cotisation
   du mois est payée, FALSE si elle ne l'est pas.

   Mois : jan, fev, mar, avr, mai, jun
   (juil n'est pas coté = 6 mois seulement)

   Mets à jour lastUpdate avec la date du jour.
   ===================================================== */

const CONFIG = {
  montant: 15,
  moisNoms: ["Jan", "Fév", "Mar", "Avr", "Mai", "Jun"],
  moisCourant: 3,   // 0=Jan, 1=Fév, 2=Mar, 3=Avr, 4=Mai, 5=Jun
  lastUpdate: "2 mai 2025",

  membres: [
    {
      nom: "Ado",
      cotisations: [true, true, true, true, false, false]
    //               Jan   Fév   Mar   Avr   Mai   Jun
    },
    {
      nom: "Pionz",
      cotisations: [true, true, true, false, false, false]
    },
    {
      nom: "Ced",
      cotisations: [true, true, true, false, false, false]
    },
    {
      nom: "Stone",
      cotisations: [true, true, false, false, false, false]
    },
    {
      nom: "Sam",
      cotisations: [true, true, true, true, false, false]
    },
    {
      nom: "Diplo",
      cotisations: [true, false, false, false, false, false]
    },
    {
      nom: "Zyggy",
      cotisations: [true, true, false, false, false, false]
    }
  ]
};

/* =====================================================
   ⛔ NE PAS MODIFIER EN DESSOUS DE CETTE LIGNE
   ===================================================== */

function initials(name) {
  return name.slice(0, 2).toUpperCase();
}

function build() {
  const { montant, moisNoms, moisCourant, membres, lastUpdate } = CONFIG;
  const totalMois = moisNoms.length;
  const totalAttendu = membres.length * moisCourant * montant;
  const totalCollecte = membres.reduce((sum, m) => {
    return sum + m.cotisations.filter(Boolean).length * montant;
  }, 0);
  const pct = totalAttendu > 0 ? Math.round(totalCollecte / (membres.length * totalMois * montant) * 100) : 0;

  let html = `
  <div class="hero">
    <div class="hero-label">Tontine — Suivi en direct</div>
    <div class="hero-title">Caisse commune 2025</div>
    <div class="hero-sub">${montant} € / mois · Jan → Jun · ${membres.length} membres</div>
  </div>

  <div class="stats">
    <div class="stat">
      <div class="stat-label">Collecté</div>
      <div class="stat-value green">${totalCollecte} €</div>
    </div>
    <div class="stat">
      <div class="stat-label">Total prévu</div>
      <div class="stat-value">${membres.length * totalMois * montant} €</div>
    </div>
    <div class="stat">
      <div class="stat-label">Membres</div>
      <div class="stat-value">${membres.length}</div>
    </div>
  </div>

  <div class="global-wrap">
    <div class="progress-header">
      <span>Progression globale</span>
      <strong>${pct}%</strong>
    </div>
    <div class="bar-bg"><div class="bar-fill" style="width:${pct}%"></div></div>
  </div>

  <div class="section-label">Membres</div>
  <div class="members">`;

  membres.forEach(m => {
    const paid = m.cotisations.filter(Boolean).length;
    const total = totalMois;
    const euros = paid * montant;
    const maxEuros = total * montant;

    let status = paid === moisCourant ? 'paid' : (paid > 0 ? 'partial' : 'none');
    let avClass = paid === moisCourant ? 'av-green' : (paid > 0 ? 'av-amber' : 'av-gray');
    let badgeClass = paid === moisCourant ? 'badge-green' : (paid > 0 ? 'badge-amber' : 'badge-gray');

    let dotsHtml = '';
    m.cotisations.forEach((v, i) => {
      let cls = v ? 'dot-paid' : (i === moisCourant ? 'dot-current' : 'dot-unpaid');
      dotsHtml += `<div class="dot ${cls}">${moisNoms[i]}</div>`;
    });

    html += `
    <div class="card ${status}">
      <div class="card-top">
        <div class="member-info">
          <div class="avatar ${avClass}">${initials(m.nom)}</div>
          <div>
            <div class="member-name">${m.nom}</div>
            <div class="member-paid-count">${paid} mois payé${paid > 1 ? 's' : ''} sur ${moisCourant} attendu${moisCourant > 1 ? 's' : ''}</div>
          </div>
        </div>
        <div class="amount-badge ${badgeClass}">${euros} / ${maxEuros} €</div>
      </div>
      <div class="months">${dotsHtml}</div>
    </div>`;
  });

  html += `</div>

  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:rgba(62,207,142,0.5)"></div> Payé</div>
    <div class="legend-item"><div class="legend-dot" style="background:rgba(245,158,11,0.5)"></div> En attente</div>
    <div class="legend-item"><div class="legend-dot" style="background:#222228"></div> Non payé</div>
  </div>

  <div class="footer">Mis à jour le ${lastUpdate}</div>`;

  document.body.innerHTML = html;
}

build();
</script>
</body>
</html>
